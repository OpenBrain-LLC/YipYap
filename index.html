<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>Real-Time Video Algorithm Engine</title>
    <style>
        :root {
            --bg: #000000;
            --panel: #111111;
            --text: #ffffff;
            --accent: #ff0050;
        }
        body {
            margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden;
            touch-action: none; /* Prevents default browser scrolling */
            user-select: none;
        }
        /* Mobile-style Feed */
        .feed-container {
            flex: 1; display: flex; align-items: center; justify-content: center; position: relative;
        }
        .video-wrapper {
            width: 100%; max-width: 400px; height: 100vh; max-height: 800px; background: #111;
            position: relative; overflow: hidden; border-radius: 12px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }
        iframe { 
            width: 150%; height: 150%; border: none; pointer-events: none; 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        }
        
        /* Minimal Overlay */
        .overlay-controls {
            position: absolute; bottom: 0; left: 0; width: 100%; padding: 30px 20px; box-sizing: border-box;
            background: linear-gradient(transparent, rgba(0,0,0,0.9)); pointer-events: none;
        }
        .author { font-weight: bold; font-size: 1.1rem; margin-bottom: 5px; display: flex; align-items: center; gap: 8px;}
        .author::before { content: ''; display: inline-block; width: 36px; height: 36px; background: var(--accent); border-radius: 50%; }
        #video-info { font-size: 1rem; margin-bottom: 5px; line-height: 1.3; }
        #video-cat { font-size: 0.85rem; color: #aaa; font-weight: bold; text-transform: uppercase; letter-spacing: 1px;}
        
        .swipe-hint {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.6); padding: 15px 25px; border-radius: 30px; font-weight: bold;
            animation: fadeOut 3s forwards; pointer-events: none; font-size: 0.9rem;
        }
        @keyframes fadeOut { 0% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; } }

        /* Dashboard UI (Kept for algorithmic visibility) */
        .dashboard {
            width: 350px; background-color: var(--panel); border-left: 1px solid #222; padding: 20px;
            display: flex; flex-direction: column; gap: 20px; overflow-y: auto; z-index: 10;
        }
        h2 { margin: 0 0 10px 0; font-size: 1.1rem; border-bottom: 1px solid #333; padding-bottom: 5px; color: #ccc;}
        .stat-box { background: #000; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 0.9rem; margin-bottom: 10px; border: 1px solid #222;}
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .highlight { color: var(--accent); font-weight: bold; }
        .control-group { margin-bottom: 15px; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 0.85rem; color: #888; }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: var(--accent); }
        
        @media (max-width: 800px) { .dashboard { display: none; } .video-wrapper { border-radius: 0; height: 100vh; max-width: 100%;} }
    </style>
</head>
<body>

    <div class="feed-container" id="swipe-area">
        <div class="video-wrapper">
            <div class="swipe-hint">Swipe Up or Press Space</div>
            <iframe id="yt-player" src="" allow="autoplay; encrypted-media"></iframe>
            <div class="overlay-controls">
                <div class="author">@algo_feed</div>
                <div id="video-info">Loading content...</div>
                <div id="video-cat">#category</div>
            </div>
        </div>
    </div>

    <div class="dashboard">
        <div>
            <h2>Real-Time Telemetry</h2>
            <div class="stat-box">
                <div class="stat-row"><span>Watch Time (Vw):</span> <span id="stat-vw">0.0s</span></div>
                <div class="stat-row"><span>Swipe Vel. (Vs):</span> <span id="stat-vs">0.0s</span></div>
                <div class="stat-row"><span>Rabbit Hole (Rh):</span> <span id="stat-rh">0.00</span></div>
                <div class="stat-row"><span>State:</span> <span id="stat-state" class="highlight">EXPLOITATION</span></div>
            </div>
        </div>

        <div>
            <h2>Algorithm Settings</h2>
            <div class="control-group">
                <label>Alpha Multiplier (<span id="val-alpha">10</span>)</label>
                <input type="range" id="set-alpha" min="1" max="50" step="1" value="10" oninput="updateSettings()">
            </div>
            <div class="control-group">
                <label>Rabbit Hole Threshold (<span id="val-rh">5.0</span>)</label>
                <input type="range" id="set-rh" min="1" max="20" step="0.5" value="5" oninput="updateSettings()">
            </div>
        </div>

        <div>
            <h2>User Affinity Vector</h2>
            <div class="stat-box" id="user-affinity">
                Swiping calibrates the vector...
            </div>
        </div>
    </div>

    }
    function normalizeVector(vec) {
        let mag = Math.sqrt(vec.reduce((sum, val) => sum + val * val, 0));

    let videoDatabase = [];
    let catKeys = Object.keys(CATEGORIES);
    for(let i=0; i < 25; i++) {
        let cat = catKeys[Math.floor(i / 5)]; 
        videoDatabase.push({
            id: i, yt_id: yt_ids[i], title: `${cat} discovery clip #${(i%5)+1}`,
            category: cat, vector: addNoise(CATEGORIES[cat]), seen: false
        });
    }

    function calculateVs() {
        if (swipeHistory.length < 2) return 5.0; 
        let totalTime = 0;
        for(let i=1; i < swipeHistory.length; i++) { totalTime += (swipeHistory[i] - swipeHistory[i-1]); }
        return (totalTime / (swipeHistory.length - 1)) / 1000; 
    }

    function processSwipe(Vw) {
        if (currentVideoIndex === -1) return false; 
        
        let now = Date.now();
        swipeHistory.push(now);
        if (swipeHistory.length > 10) swipeHistory.shift(); 

        let Vs = calculateVs();
        let Vi = videoDatabase[currentVideoIndex].vector;

        let diffVector = userVector.map((u, i) => u - Vi[i]);
        let Rh = getMagnitude(diffVector.map(val => Math.tanh(val))) * Vw;

        document.getElementById('stat-vw').innerText = Vw.toFixed(1) + 's';
        document.getElementById('stat-vs').innerText = Vs.toFixed(1) + 's';
        document.getElementById('stat-rh').innerText = Rh.toFixed(2);

        let isRabbitHole = Rh > RH_THRESHOLD;
        document.getElementById('stat-state').innerText = isRabbitHole ? "EXPLORATION" : "EXPLOITATION";
        document.getElementById('stat-state').style.color = isRabbitHole ? "#00ffcc" : "#ff0050";

        let denominator = Math.tanh(Math.abs(Vs)) + 2;
        for(let d=0; d < DIMENSIONS; d++) {
            userVector[d] += ALPHA * Math.tanh((Vw * (Vi[d] - userVector[d])) / denominator); 
        }

        userVector = normalizeVector(userVector);
        updateAffinityDisplay();
        return isRabbitHole;
    }

    function recommendNextVideo(isRabbitHole) {
        let unseenVideos = videoDatabase.filter(v => !v.seen);
        if (unseenVideos.length === 0) {
            // Reset if out of videos to maintain the endless loop
            videoDatabase.forEach(v => v.seen = false);
            unseenVideos = videoDatabase;
        }

        let bestVideo = null;
        let highestScore = -Infinity;

        if (isRabbitHole) {
            let anomalyVector = videoDatabase[currentVideoIndex].vector;
            unseenVideos.forEach(v => {
                let score = dotProduct(anomalyVector, v.vector);
                if (score > highestScore) { highestScore = score; bestVideo = v; }
            });
        } else {
            unseenVideos.forEach(v => {
                let score = dotProduct(userVector, v.vector);
                if (score > highestScore) { highestScore = score; bestVideo = v; }
            });
        }

        if (!isRabbitHole && Math.random() < 0.1) {
            bestVideo = unseenVideos[Math.floor(Math.random() * unseenVideos.length)];
        }

        bestVideo.seen = true;
        currentVideoIndex = videoDatabase.indexOf(bestVideo);
        
        // Load YouTube iframe centered and cropped
        document.getElementById('yt-player').src = `https://www.youtube.com/embed/${bestVideo.yt_id}?autoplay=1&controls=0&mute=1&loop=1&playsinline=1&modestbranding=1`;
        document.getElementById('video-info').innerText = bestVideo.title;
        document.getElementById('video-cat').innerText = `#${bestVideo.category.toLowerCase()}`;
        
        currentVideoStartTime = Date.now();
    }

    // --- GESTURE & KEYBOARD CONTROLS ---
    function triggerNext() {
        // Calculate true watch time based on exact milliseconds spent
        let Vw = (Date.now() - currentVideoStartTime) / 1000;
        let isRabbitHole = processSwipe(Vw);
        recommendNextVideo(isRabbitHole);
    }

    // Keyboard Events
    document.addEventListener('keydown', (e) => {
        if (['Space', 'ArrowDown', 'ArrowRight'].includes(e.code)) {
            e.preventDefault();
            triggerNext();
        }
    });

    // Touch / Swipe Events
    let touchStartY = 0;
    let touchEndY = 0;
    
    document.addEventListener('touchstart', e => {
        touchStartY = e.changedTouches[0].screenY;
    }, {passive: true});

    document.addEventListener('touchend', e => {
        touchEndY = e.changedTouches[0].screenY;
        handleSwipe();
    }, {passive: true});

    // Mouse Drag (for desktop testing)
    let isDragging = false;
    document.addEventListener('mousedown', e => { isDragging = true; touchStartY = e.clientY; });
    document.addEventListener('mouseup', e => { 
        if(isDragging) { touchEndY = e.clientY; handleSwipe(); isDragging = false; }
    });

    function handleSwipe() {
        if (touchStartY - touchEndY > 50) { // Swiped Up
            triggerNext();
        }
    }

    // Settings & Display UI
    function updateSettings() {
        ALPHA = parseFloat(document.getElementById('set-alpha').value);
        RH_THRESHOLD = parseFloat(document.getElementById('set-rh').value);
        document.getElementById('val-alpha').innerText = ALPHA;
        document.getElementById('val-rh').innerText = RH_THRESHOLD;
    }

    function updateAffinityDisplay() {
        let affinities = [];
        catKeys.forEach(cat => { affinities.push({cat: cat, score: dotProduct(userVector, CATEGORIES[cat])}); });
        affinities.sort((a, b) => b.score - a.score); 
        
        let html = "";
        affinities.forEach(a => {
            let percent = Math.max(0, (a.score * 100)).toFixed(1);
            html += `<div class="stat-row"><span>${a.cat}:</span> <span>${percent}%</span></div>`;
        });
        document.getElementById('user-affinity').innerHTML = html;
    }

    // Initialize
    recommendNextVideo(false);

</script>
</body>
</html>
