<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YipYap | home</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="https://cloud.umami.is/script.js" data-website-id="c1ec9816-46f6-4fc3-b643-8eab7450e691"></script>
</head>
<body>
    <div class="feed-container" id="swipe-area">
        <div class="video-wrapper" id="video-wrapper">
            <div class="swipe-hint" id="interaction-hint">Swipe Up or Click to Start/Unmute</div>
            <iframe id="yt-player" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" referrerpolicy="strict-origin-when-cross-origin"></iframe>
            <div class="overlay-controls">
                <div class="author">@YipYap</div>
                <div id="video-info">Loading...</div>
                <div id="video-cat">#category</div>
            </div>
        </div>
    </div>
    <div class="dashboard" id="dev-dashboard">
        <div>
            <h2>Real-Time Telemetry</h2>
            <div class="stat-box">
                <div class="stat-row"><span>Watch Time (V_{w}):</span> <span id="stat-vw">0.0s</span></div>
                <div class="stat-row"><span>Swipe Vel. (V_{s}):</span> <span id="stat-vs">0.0s</span></div>
                <div class="stat-row"><span>Rabbit Hole (R_{h}):</span> <span id="stat-rh">0.00</span></div>
                <div class="stat-row"><span>State:</span> <span id="stat-state" class="highlight">EXPLOITATION</span></div>
            </div>
        </div>
        <div>
            <h2>Algorithm Settings</h2>
            <div class="control-group">
                <label>Alpha Multiplier (<span id="val-alpha">10</span>)</label>
                <input type="range" id="set-alpha" min="1" max="50" step="1" value="25">
            </div>
            <div class="control-group">
                <label>Rabbit Hole Threshold (<span id="val-rh">5.0</span>)</label>
                <input type="range" id="set-rh" min="1" max="20" step="0.5" value="5">
            </div>
        </div>
        <div>
            <h2>User Vector Rates</h2>
            <div class="stat-box" id="user-affinity">
                Swiping calibrates the vector...
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
